services:
  adminer:
    image: dockette/adminer:full
    restart: unless-stopped
    ports:
      - "8080:80"       # 将宿主机8080端口映射到容器的80端口
    environment:
      - ADMINER_THEME=dracula
      # 可选：增加上传文件大小、内存等限制
      #   - MEMORY=512M
      #   - UPLOAD=4096M
      - WORKERS=4
      # 可选：加载官方插件 (用空格分隔) 表格过滤、富文本编辑
      - ADMINER_PLUGINS=tables-filter tinymce
    # podman 容器访问宿主机 --network pasta:--map-guest-addr,169.254.1.2
    # docker 容器访问宿主机 --add-host=host.docker.internal:host-gateway
    # 访问宿主机数据库（Linux 必需）,web 页面的主机地址是 host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux访问宿主机数据库必需
    # 如果连接容器的网络
    #networks:
    #  - db-net

# 如果连接容器的网络
#networks:
#  db-net:
#    external: true
